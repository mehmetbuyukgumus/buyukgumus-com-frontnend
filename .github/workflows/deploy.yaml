name: Frontend Docker Build and CapRover Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            mehmetbuyukgumus/buyukgumus-com-frontend:latest
            mehmetbuyukgumus/buyukgumus-com-frontend:${{ github.sha }}

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          token: ${{ secrets.CAPROVER_TOKEN }}
          app: 'www' 
          image: mehmetbuyukgumus/buyukgumus-com-frontend:${{ github.sha }}