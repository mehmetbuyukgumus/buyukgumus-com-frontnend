name: Frontend Docker Build and CapRover Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Release (Otomatik Versiyonlama)
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          branches: |
            ["main"]
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        if: github.event_name == 'workflow_dispatch' || steps.semantic.outputs.new_release_published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            mehmetbuyukgumus/buyukgumus-com-frontend:latest
            mehmetbuyukgumus/buyukgumus-com-frontend:${{ steps.semantic.outputs.new_release_version || 'latest' }}

      - name: Deploy to CapRover
        if: github.event_name == 'workflow_dispatch' || steps.semantic.outputs.new_release_published == 'true'
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          token: ${{ secrets.CAPROVER_TOKEN }}
          app: 'buyukgumus-frontend'
          image: mehmetbuyukgumus/buyukgumus-com-frontend:${{ steps.semantic.outputs.new_release_version || 'latest' }}