name: Frontend Docker Build and CapRover Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Semantic Release (Otomatik Versiyonlama)
        id: semantic
        uses: cycjimmy/semantic-release-action@v3
        with:
          branches: |
            ['main']
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            mehmetbuyukgumus/buyukgumus-com-frontend:latest
            mehmetbuyukgumus/buyukgumus-com-frontend:${{ steps.semantic.outputs.new_release_version }}